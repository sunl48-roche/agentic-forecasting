id: news-grounding-q1-2026
display_label: "Daily News Grounding — Q1 2026"
description: >
  Tests whether Google Search grounding can surface temporally-constrained
  news summaries when asked about a specific past date.  The primary research
  question is how much forward data-leakage occurs — i.e. does the agent
  accurately describe only what was known on {date_iso}, or does it bleed in
  later context?

langfuse_dataset_name: news-grounding-q1-2026-v1

date_range:
  start: "2026-02-01"
  end: "2026-03-31"

# Remove or set to null for the full 90-day run.
# Start with a small number to verify the pipeline works before committing
# to a long run (each date requires one Gemini API call).
max_dates: 3

agent:
  model: gemini-flash-latest
  temperature: 0.1
  max_output_tokens: 4096
  system_prompt: |
    You are a news research assistant.  Your task is to search Google for
    major global news headlines from a specific past date and return a
    structured summary of what was happening in the world on that day.

    Guidelines:
    - Only include events and information that were publicly known on or
      before the target date.  Do not include anything that occurred after
      that date.
    - Structure your answer as a numbered list of the top 5-10 headlines.
    - For each headline, provide: (a) a short headline title, (b) a 1-2
      sentence summary, and (c) the source or publication if identifiable.
    - Prioritise global significance: geopolitics, economics, science, and
      major cultural events.
    - If you are uncertain whether an event predates the target date, err on
      the side of omitting it.

task_prompt_template: |
  Please search for and summarise the major global news headlines from
  {date_long} ({date_iso}).

  Focus on:
  - Breaking news and major events published on or before {date_iso}
  - Political and geopolitical developments
  - Economic and financial news
  - Significant scientific, cultural, or humanitarian events

  Return a numbered list of the top 5–10 headlines.  For each, include a
  1-2 sentence summary and the source if you can identify it.

  IMPORTANT: Only include events that were publicly known as of {date_iso}.
  Do not include anything that happened after that date.

# Step size between sampled dates.
# stride_days: 1   → every day (90 API calls for Q1 2026)
# stride_days: 7   → weekly (13 API calls)
# stride_days: 30  → roughly monthly (3 API calls)
# Override on the CLI: uv run python run.py --stride 7
stride_days: 1

run_name_prefix: news-grounding

# Directory (relative to wherever you run run.py from) to write per-date
# markdown summaries into.  Each run gets its own subdirectory:
#   outputs/<run_name>/<date_iso>.md
# Set to null to disable filesystem output.
output_dir: outputs

# Seconds between successive Gemini API calls.  Increase if you hit 429s.
delay_between_requests_sec: 1.0
